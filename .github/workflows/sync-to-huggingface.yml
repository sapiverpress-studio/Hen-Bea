name: Sync to Hugging Face
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Hugging Face CLI
        run: pip install -U huggingface_hub

      - name: Upload app files to existing Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload sapiverpress/hen-bea-generator . . --repo-type space --exclude '.git*' --exclude '.github*' --commit-message 'Sync from GitHub'
