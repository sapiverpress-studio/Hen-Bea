name: Hen & Bea Ten-Scene Pilot Batch

on:
  workflow_dispatch:
    inputs:
      start:
        description: First scene number in pilot batch (1-10)
        required: true
        default: "1"
      end:
        description: Last scene number in pilot batch (1-10)
        required: true
        default: "10"
      pause_seconds:
        description: Pause between paid tasks
        required: true
        default: "30"

permissions:
  contents: write

jobs:
  pilot-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gradio_client requests

      - name: Run selected pilot scenes sequentially
        env:
          HF_SPACE_ID: sapiverpress/hen-bea-generator
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PIAPI_API_KEY: ${{ secrets.PIAPI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/run_pilot_batch.py \
            --batch-file prompts/pilot_batch_01.json \
            --start "${{ github.event.inputs.start }}" \
            --end "${{ github.event.inputs.end }}" \
            --pause-seconds "${{ github.event.inputs.pause_seconds }}"

      - name: Upload pilot outputs and manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hen-bea-pilot-${{ github.event.inputs.start }}-${{ github.event.inputs.end }}
          path: output/
          if-no-files-found: warn
