name: Hen & Bea Production Batch 10

on:
  workflow_dispatch:
    inputs:
      batch_number:
        description: Batch label for artifact naming
        required: true
        default: "01"
      start_index:
        description: 1-based starting scene index
        required: true
        default: "1"
      attempt_count:
        description: Number of scene attempts in this batch
        required: true
        default: "10"
      pause_seconds:
        description: Seconds to wait between paid Hailuo tasks
        required: true
        default: "20"
      stop_after_total_failures:
        description: Stop after this many total failures
        required: true
        default: "5"
      stop_after_consecutive_failures:
        description: Stop after this many consecutive failures
        required: true
        default: "3"

permissions:
  contents: write

jobs:
  production-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gradio_client requests

      - name: Run ten-scene production batch
        env:
          HF_SPACE_ID: sapiverpress/hen-bea-generator
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PIAPI_API_KEY: ${{ secrets.PIAPI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/run_production_batch.py \
            --start-index "${{ github.event.inputs.start_index }}" \
            --attempt-count "${{ github.event.inputs.attempt_count }}" \
            --pause-seconds "${{ github.event.inputs.pause_seconds }}" \
            --stop-after-total-failures "${{ github.event.inputs.stop_after_total_failures }}" \
            --stop-after-consecutive-failures "${{ github.event.inputs.stop_after_consecutive_failures }}" \
            --output-tag "batch_${{ github.event.inputs.batch_number }}"

      - name: Upload batch outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hen-bea-batch-${{ github.event.inputs.batch_number }}
          path: output/
          if-no-files-found: warn
