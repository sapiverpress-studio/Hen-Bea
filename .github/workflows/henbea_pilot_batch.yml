name: Hen & Bea Production Sweep 60

on:
  workflow_dispatch:
    inputs:
      target_successes:
        description: Number of successful videos to collect before stopping
        required: true
        default: "60"
      max_attempts:
        description: Maximum scene attempts allowed in this one-run workflow
        required: true
        default: "90"
      pause_seconds:
        description: Seconds to wait between paid Hailuo tasks
        required: true
        default: "20"

permissions:
  contents: write

jobs:
  production-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gradio_client requests

      - name: Run production sweep sequentially
        env:
          HF_SPACE_ID: sapiverpress/hen-bea-generator
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PIAPI_API_KEY: ${{ secrets.PIAPI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/run_production_batch.py \
            --target-successes "${{ github.event.inputs.target_successes }}" \
            --max-attempts "${{ github.event.inputs.max_attempts }}" \
            --pause-seconds "${{ github.event.inputs.pause_seconds }}"

      - name: Upload production outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hen-bea-production-sweep-01
          path: output/
          if-no-files-found: warn
